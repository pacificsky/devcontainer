name: Docker PR Build

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.github/workflows/daily-docker-build.yml'
      - '.github/workflows/docker-pr-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          tags: devcontainer:pr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image functionality
        run: |
          docker run --rm devcontainer:pr-test /bin/bash -c "
            echo 'Testing installations...'

            if command -v claude >/dev/null 2>&1; then
              echo '✅ Claude Code installed'
            else
              echo '❌ Claude Code missing' && exit 1
            fi

            if command -v codex >/dev/null 2>&1; then
              echo '✅ OpenAI Codex installed'
            else
              echo '❌ OpenAI Codex missing' && exit 1
            fi

            if command -v gh >/dev/null 2>&1; then
              echo '✅ GitHub CLI installed'
            else
              echo '❌ GitHub CLI missing' && exit 1
            fi

            echo 'All core tools are properly installed!'
          "
